services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: aivo
      POSTGRES_PASSWORD: aivo_test
      POSTGRES_DB: aivo_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivo -d aivo_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: ["redis-server", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    ports:
      - "4223:4222"
      - "8223:8222"
    command: ["--jetstream", "--store_dir", "/tmp/nats", "-m", "8222"]
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 3s
      timeout: 3s
      retries: 10

  identity-svc:
    build:
      context: ..
      dockerfile: services/identity-svc/Dockerfile
    ports:
      - "3101:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://aivo:aivo_test@postgres:5432/aivo_test
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AUTH_SECRET: e2e-test-secret-key-at-least-32-characters-long
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?Generate keys with: openssl genpkey -algorithm RSA -out jwt-private.pem -pkeyopt rsa_keygen_bits:2048}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?Generate keys with: openssl rsa -in jwt-private.pem -pubout -out jwt-public.pem}
      APP_URL: http://localhost:3000
      NODE_ENV: test
      LOG_LEVEL: warn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  brain-svc:
    build:
      context: ../services/brain-svc
      dockerfile: Dockerfile
    ports:
      - "3102:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql+asyncpg://aivo:aivo_test@postgres:5432/aivo_test
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      MODEL_STORE_DIR: /tmp/models
      NODE_ENV: test
      LOG_LEVEL: warn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  default:
    name: aivo-e2e-network
