name: Infrastructure Plan

on:
  pull_request:
    branches: [master, main]
    paths:
      - "infra/helm/**"
      - "infra/terraform/**"
      - "infra/monitoring/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ═════════════════════════════════════════════
  # Validate Helm Charts
  # ═════════════════════════════════════════════
  helm-validate:
    name: Validate Helm Charts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.3"

      - name: Helm lint
        run: helm lint infra/helm -f infra/helm/values/hetzner.yaml

      - name: Helm template (dry-run)
        id: template
        run: |
          helm template aivo-learning-saas infra/helm \
            -f infra/helm/values/hetzner.yaml \
            -n aivo \
            --debug 2>&1 | tee /tmp/helm-output.txt
        continue-on-error: true

      - name: Post validation as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/helm-output.txt', 'utf8');
            const truncated = output.length > 60000
              ? output.substring(0, 60000) + '\n\n... (truncated)'
              : output;

            const body = `## Helm Chart Validation — \`infra/helm\`

            **Status:** ${{ steps.template.outcome == 'success' && '✅ Success' || '❌ Failed' }}

            <details>
            <summary>Show Template Output</summary>

            \`\`\`yaml
            ${truncated}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.includes('## Helm Chart Validation') && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on template error
        if: steps.template.outcome == 'failure'
        run: exit 1

  # ═════════════════════════════════════════════
  # Validate Terraform (documentation-only config)
  # ═════════════════════════════════════════════
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Terraform init (local backend override)
        working-directory: infra/terraform/environments/prod
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform/environments/prod
        run: terraform validate
