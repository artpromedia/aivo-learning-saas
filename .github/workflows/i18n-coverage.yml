name: i18n Coverage

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/db/src/schema/**"
      - "services/*/src/**"
      - "apps/web/src/**"
      - "**/i18n/**"
      - "**/locales/**"
  workflow_dispatch:

jobs:
  i18n-coverage:
    name: Translation Coverage Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aivo
          POSTGRES_PASSWORD: aivo_test_pw
          POSTGRES_DB: aivo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aivo"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://aivo:aivo_test_pw@localhost:5432/aivo_test
      NODE_VERSION: "22.22.1"
      PNPM_VERSION: "10.32.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Push database schema
        run: pnpm --filter @aivo/db run db:push

      - name: Seed i18n data
        run: |
          if pnpm --filter @aivo/db run seed:i18n 2>/dev/null; then
            echo "i18n seed completed"
          else
            echo "::warning::i18n seed script not available"
          fi

      - name: Check translation coverage
        run: |
          echo "## i18n Translation Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count namespaces
          NS_COUNT=$(psql "$DATABASE_URL" -t -c \
            "SELECT COUNT(DISTINCT namespace) FROM i18n_keys;" 2>/dev/null || echo "0")
          NS_COUNT=$(echo "$NS_COUNT" | tr -d ' ')
          echo "Namespaces: $NS_COUNT" >> $GITHUB_STEP_SUMMARY

          # Count total keys
          KEY_COUNT=$(psql "$DATABASE_URL" -t -c \
            "SELECT COUNT(*) FROM i18n_keys;" 2>/dev/null || echo "0")
          KEY_COUNT=$(echo "$KEY_COUNT" | tr -d ' ')
          echo "Total keys: $KEY_COUNT" >> $GITHUB_STEP_SUMMARY

          # Count translated vs untranslated
          TRANSLATED=$(psql "$DATABASE_URL" -t -c \
            "SELECT COUNT(*) FROM i18n_translations;" 2>/dev/null || echo "0")
          TRANSLATED=$(echo "$TRANSLATED" | tr -d ' ')
          echo "Translations: $TRANSLATED" >> $GITHUB_STEP_SUMMARY

          # List languages
          LANGS=$(psql "$DATABASE_URL" -t -c \
            "SELECT DISTINCT locale FROM i18n_translations ORDER BY locale;" 2>/dev/null || echo "none")
          echo "Languages: $LANGS" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Audit complete." >> $GITHUB_STEP_SUMMARY
