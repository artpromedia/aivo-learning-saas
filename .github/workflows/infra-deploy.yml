name: Infrastructure Deploy

on:
  push:
    branches: [master, main]
    paths:
      - "infra/helm/**"
      - "infra/monitoring/**"
  workflow_dispatch:

concurrency:
  group: infra-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ═════════════════════════════════════════════
  # Helm Deploy (Hetzner Dedicated Servers)
  # ═════════════════════════════════════════════
  # Infrastructure is 4 Hetzner Robot dedicated servers running K3s.
  # Servers are provisioned manually — see HETZNER_DEPLOYMENT_GUIDE.md.
  # This workflow deploys Helm chart changes to the existing cluster.
  helm:
    name: Helm Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.3"

      - name: Configure kubectl
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "::error::KUBE_CONFIG secret is not set"
            exit 1
          fi
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster reachable
        run: |
          if ! kubectl cluster-info; then
            echo "::error::Cannot reach Kubernetes cluster"
            exit 1
          fi
          kubectl get nodes
          echo "Cluster is reachable"

      - name: Clear stuck Helm releases
        run: |
          # Check if there's a pending/stuck release and roll back if needed
          STATUS=$(helm status aivo-learning-saas -n aivo -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-found")
          echo "Current Helm release status: $STATUS"
          if [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-rollback" ]; then
            echo "::warning::Found stuck Helm release in '$STATUS' state — rolling back"
            helm rollback aivo-learning-saas 0 -n aivo --timeout 5m || \
              helm uninstall aivo-learning-saas -n aivo --no-hooks 2>/dev/null || true
          fi

      - name: Helm upgrade
        run: |
          helm upgrade --install aivo-learning-saas infra/helm \
            -f infra/helm/values/hetzner.yaml \
            -n aivo --create-namespace \
            --timeout 10m \
            --wait
