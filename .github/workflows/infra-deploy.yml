name: Infrastructure Deploy

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "services/**"
  workflow_dispatch:

concurrency:
  group: infra-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_DIR: infra/terraform/environments/prod

jobs:
  # ═════════════════════════════════════════════
  # Stage 1: Terraform Apply
  # ═════════════════════════════════════════════
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.HETZNER_OBJECT_STORAGE_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.HETZNER_OBJECT_STORAGE_SECRET }}"
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -out=tfplan
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

  # ═════════════════════════════════════════════
  # Stage 2: Helm Deploy
  # ═════════════════════════════════════════════
  helm:
    name: Helm Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.3"

      - name: Configure kubectl
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "::error::KUBE_CONFIG secret is not set"
            exit 1
          fi
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster reachable
        run: |
          if ! kubectl cluster-info; then
            echo "::error::Cannot reach Kubernetes cluster"
            exit 1
          fi
          kubectl get nodes
          echo "Cluster is reachable"

      - name: Helm upgrade
        run: |
          helm upgrade --install aivolearning infra/helm \
            -f infra/helm/values/hetzner.yaml \
            -n aivo --create-namespace \
            --timeout 10m \
            --wait
