name: Infrastructure Deploy

on:
  push:
    branches: [master, main]
    paths:
      - "infra/**"
      - "services/**"
  workflow_dispatch:

concurrency:
  group: infra-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_DIR: infra/terraform/environments/prod

jobs:
  # ═════════════════════════════════════════════
  # Stage 1: Terraform Apply
  # ═════════════════════════════════════════════
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Configure Terraform backend credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.CF_R2_ACCESS_KEY_ID }}"     >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.CF_R2_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV

      - name: Validate required secrets
        run: |
          MISSING=0
          for secret_name in HCLOUD_TOKEN SSH_PUBLIC_KEY; do
            eval val="\$$secret_name"
            if [ -z "$val" ]; then
              echo "::error::Required secret $secret_name is not set"
              MISSING=$((MISSING + 1))
            fi
          done
          [ "$MISSING" -eq 0 ] || exit 1
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -reconfigure

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -out=tfplan
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

  # ═════════════════════════════════════════════
  # Stage 2: Helm Deploy
  # ═════════════════════════════════════════════
  helm:
    name: Helm Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.3"

      - name: Configure kubectl
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "::error::KUBE_CONFIG secret is not set"
            exit 1
          fi
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster reachable
        run: |
          if ! kubectl cluster-info; then
            echo "::error::Cannot reach Kubernetes cluster"
            exit 1
          fi
          kubectl get nodes
          echo "Cluster is reachable"

      - name: Clear stuck Helm releases
        run: |
          # Check if there's a pending/stuck release and roll back if needed
          STATUS=$(helm status aivolearning -n aivo -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-found")
          echo "Current Helm release status: $STATUS"
          if [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-rollback" ]; then
            echo "::warning::Found stuck Helm release in '$STATUS' state — rolling back"
            helm rollback aivolearning 0 -n aivo --timeout 5m || \
              helm uninstall aivolearning -n aivo --no-hooks 2>/dev/null || true
          fi

      - name: Helm upgrade
        run: |
          helm upgrade --install aivolearning infra/helm \
            -f infra/helm/values/hetzner.yaml \
            -n aivo --create-namespace \
            --timeout 10m \
            --wait
