name: Marketing Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/marketing/**"
  workflow_dispatch:

concurrency:
  group: marketing-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/artpromedia
  NODE_VERSION: "22"
  PNPM_VERSION: "10.6.5"

jobs:
  build-push:
    name: Build & Push Marketing Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version tag
        id: version
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          echo "version=main-$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.AIVO_GHCR_PUSH }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/marketing
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/marketing/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=marketing
          cache-to: type=gha,scope=marketing,mode=max

  deploy:
    name: Deploy Marketing to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-push
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.3"

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy marketing via Helm
        run: |
          VERSION="${{ needs.build-push.outputs.version }}"
          IMAGE="${{ env.IMAGE_PREFIX }}/marketing"

          helm upgrade --install aivo-learning-saas infra/helm \
            -f infra/helm/values/hetzner.yaml \
            --set marketing.image.repository="$IMAGE" \
            --set marketing.image.tag="$VERSION" \
            -n aivo \
            --timeout 5m \
            --wait \
            --reuse-values

      - name: Verify marketing rollout
        run: |
          kubectl rollout status deployment/marketing -n aivo --timeout=120s

      - name: Smoke test
        run: |
          # Port-forward and health check
          kubectl port-forward svc/marketing 8080:3000 -n aivo &
          PF_PID=$!
          sleep 5

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || echo "000")
          kill $PF_PID 2>/dev/null || true

          echo "Marketing health check: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Marketing health check returned HTTP $HTTP_CODE"
          fi

          echo "## Marketing Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.build-push.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Health:** HTTP $HTTP_CODE" >> $GITHUB_STEP_SUMMARY
