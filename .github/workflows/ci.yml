name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @aivo/brand
        run: pnpm --filter @aivo/brand build

      - name: Build @aivo/ui
        run: pnpm --filter @aivo/ui build

      - name: Build @aivo/marketing
        run: pnpm --filter @aivo/marketing build

      - name: Lint
        run: pnpm lint:all

      - name: Type check
        run: pnpm type-check:all

      - name: Test
        run: pnpm test:all

  stub-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run stub audit
        run: bash scripts/audit-stubs.sh

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build-lint-typecheck, stub-audit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aivo
          POSTGRES_PASSWORD: aivo_test
          POSTGRES_DB: aivo_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:2.10-alpine
        ports:
          - 4223:4222
        options: >-
          --health-cmd "true"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install E2E dependencies
        run: cd e2e && npm install

      - name: Install Playwright
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Generate test JWT keys
        run: |
          openssl genpkey -algorithm RSA -out /tmp/jwt-private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -in /tmp/jwt-private.pem -pubout -out /tmp/jwt-public.pem
          echo "JWT_PRIVATE_KEY<<JWTEOF" >> $GITHUB_ENV
          cat /tmp/jwt-private.pem >> $GITHUB_ENV
          echo "JWTEOF" >> $GITHUB_ENV
          echo "JWT_PUBLIC_KEY<<JWTPUBEOF" >> $GITHUB_ENV
          cat /tmp/jwt-public.pem >> $GITHUB_ENV
          echo "JWTPUBEOF" >> $GITHUB_ENV

      - name: Build workspace packages
        run: |
          pnpm --filter @aivo/db build
          pnpm --filter @aivo/events build
          pnpm --filter @aivo/observability build
          pnpm --filter @aivo/brand build

      - name: Start identity-svc
        env:
          DATABASE_URL: postgresql://aivo:aivo_test@localhost:5433/aivo_test
          REDIS_URL: redis://localhost:6380
          NATS_URL: nats://localhost:4223
          AUTH_SECRET: e2e-test-secret-key-at-least-32-characters-long
          APP_URL: http://localhost:3000
          PORT: "3101"
          NODE_ENV: test
        run: |
          pnpm --filter identity-svc dev &
          echo "Waiting for identity-svc to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3101/health > /dev/null 2>&1; then
              echo "identity-svc is healthy"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "identity-svc did not become healthy"
              exit 1
            fi
            sleep 2
          done

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://aivo:aivo_test@localhost:5433/aivo_test
          REDIS_URL: redis://localhost:6380
          NATS_URL: nats://localhost:4223
          NODE_ENV: test
          API_BASE_URL: http://localhost:3101
          NEXT_PUBLIC_API_URL: http://localhost:3101
        run: cd e2e && npx playwright test --reporter=json --output=coverage-reports/

      - name: Upload E2E coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-reports
          path: e2e/coverage-reports/
          retention-days: 30
