name: CI — PR Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.22.1"
  PNPM_VERSION: "10.32.1"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ─────────────────────────────────────────────
  # Lint & Type Check
  # ─────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint

      - name: Type check
        run: pnpm turbo run type-check

  # ─────────────────────────────────────────────
  # Secret Scanning (inline)
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Integration Tests (Vitest + Postgres)
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-typecheck, secret-scan]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aivo
          POSTGRES_PASSWORD: aivo_test_pw
          POSTGRES_DB: aivo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aivo"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://aivo:aivo_test_pw@localhost:5432/aivo_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Push database schema
        run: pnpm --filter @aivo/db run db:push
        env:
          DATABASE_URL: postgresql://aivo:aivo_test_pw@localhost:5432/aivo_test

      - name: Run identity-svc tests with coverage
        run: pnpm --filter identity-svc run test:coverage
        env:
          DATABASE_URL: postgresql://aivo:aivo_test_pw@localhost:5432/aivo_test
          JWT_SECRET: ci-test-jwt-secret-not-real
          BETTER_AUTH_SECRET: ci-test-auth-secret-not-real
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: re_test_placeholder

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/identity-svc/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # E2E Tests (Playwright + Postgres + Redis + NATS)
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: integration-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aivo
          POSTGRES_PASSWORD: aivo_dev_pw
          POSTGRES_DB: aivo_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aivo"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://aivo:aivo_dev_pw@localhost:5432/aivo_dev
      REDIS_URL: redis://localhost:6379
      NATS_URL: nats://localhost:4222
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-not-real
      BETTER_AUTH_SECRET: ci-test-auth-secret-not-real
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      RESEND_API_KEY: re_test_placeholder
      IDENTITY_SVC_URL: http://localhost:4001
      LEARNING_SVC_URL: http://localhost:4002
      ENGAGEMENT_SVC_URL: http://localhost:3008
      FAMILY_SVC_URL: http://localhost:3005
      COMMS_SVC_URL: http://localhost:3009
      BILLING_SVC_URL: http://localhost:3004
      ADMIN_SVC_URL: http://localhost:3007
      I18N_SVC_URL: http://localhost:3011

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start NATS JetStream
        run: |
          docker run -d --name nats-js --network host \
            nats:2.10-alpine \
            -js -m 8222
          echo "Waiting for NATS to be ready..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8222/healthz > /dev/null 2>&1; then
              echo "NATS is ready"
              break
            fi
            echo "Attempt $i/15 — waiting for NATS..."
            sleep 2
          done

      - name: Build ALL packages and apps
        run: pnpm turbo run build

      - name: Verify critical workspace dist files
        run: |
          MISSING=0
          for pkg in \
            packages/db/dist/index.js \
            packages/brand/dist/index.js \
            packages/events/dist/index.js; do
            if [ ! -f "$pkg" ]; then
              echo "MISSING: $pkg"
              MISSING=$((MISSING + 1))
            else
              echo "OK: $pkg"
            fi
          done
          for svc in \
            services/identity-svc/dist/index.js \
            services/learning-svc/dist/index.js \
            services/engagement-svc/dist/index.js \
            services/family-svc/dist/index.js \
            services/comms-svc/dist/index.js \
            services/billing-svc/dist/index.js \
            services/admin-svc/dist/index.js \
            services/integrations-svc/dist/index.js \
            services/tutor-svc/dist/index.js; do
            if [ ! -f "$svc" ]; then
              echo "MISSING: $svc"
              MISSING=$((MISSING + 1))
            else
              echo "OK: $svc"
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING critical workspace dist files are missing"
            exit 1
          fi
          echo "All critical workspace dist files verified"

      - name: Verify Postgres connectivity
        run: |
          for i in $(seq 1 15); do
            if pg_isready -h localhost -p 5432 -U aivo; then
              echo "Postgres is ready"
              break
            fi
            echo "Attempt $i/15 — waiting for Postgres..."
            sleep 2
          done

      - name: Setup database (schema + RLS + seed)
        run: |
          pnpm --filter @aivo/db run db:push
          if pnpm --filter @aivo/db run ci:setup 2>/dev/null; then
            echo "ci:setup completed"
          else
            echo "ci:setup script not found, schema pushed via db:push"
          fi

      - name: Seed i18n data
        run: |
          if pnpm --filter @aivo/db run seed:i18n 2>/dev/null; then
            echo "i18n seed completed"
          else
            echo "i18n seed script not available, skipping"
          fi

      - name: Verify i18n namespaces
        run: |
          NS_COUNT=$(psql "$DATABASE_URL" -t -c \
            "SELECT COUNT(DISTINCT namespace) FROM i18n_keys;" 2>/dev/null || echo "0")
          NS_COUNT=$(echo "$NS_COUNT" | tr -d ' ')
          echo "i18n namespaces found: $NS_COUNT"
          if [ "$NS_COUNT" -ge 7 ] 2>/dev/null; then
            echo "i18n namespace count OK (>= 7)"
          else
            echo "::warning::i18n namespace count ($NS_COUNT) is below threshold or table does not exist"
          fi

      - name: Provision NATS JetStream streams
        run: |
          if pnpm --filter @aivo/events run provision 2>/dev/null; then
            echo "NATS streams provisioned via @aivo/events"
          elif npx --yes nats-cli stream ls 2>/dev/null; then
            echo "NATS streams check passed"
          else
            echo "::warning::NATS stream provisioning not available"
          fi

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          pnpm exec playwright test \
            --project=setup \
            --project=auth-setup \
            --project=chromium
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Platform Smoke Tests
  # ─────────────────────────────────────────────
  smoke-test:
    name: Platform Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: e2e-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aivo
          POSTGRES_PASSWORD: aivo_dev_pw
          POSTGRES_DB: aivo_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aivo"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://aivo:aivo_dev_pw@localhost:5432/aivo_dev
      REDIS_URL: redis://localhost:6379
      NATS_URL: nats://localhost:4222
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-not-real
      BETTER_AUTH_SECRET: ci-test-auth-secret-not-real
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      RESEND_API_KEY: re_test_placeholder
      IDENTITY_SVC_URL: http://localhost:4001
      LEARNING_SVC_URL: http://localhost:4002
      ENGAGEMENT_SVC_URL: http://localhost:3008
      FAMILY_SVC_URL: http://localhost:3005
      COMMS_SVC_URL: http://localhost:3009
      BILLING_SVC_URL: http://localhost:3004
      ADMIN_SVC_URL: http://localhost:3007
      I18N_SVC_URL: http://localhost:3011

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start NATS JetStream
        run: |
          docker run -d --name nats-js --network host \
            nats:2.10-alpine \
            -js -m 8222
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8222/healthz > /dev/null 2>&1; then
              echo "NATS is ready"
              break
            fi
            sleep 2
          done

      - name: Build ALL packages and apps
        run: pnpm turbo run build

      - name: Setup database
        run: |
          pnpm --filter @aivo/db run db:push
          if pnpm --filter @aivo/db run ci:setup 2>/dev/null; then
            echo "ci:setup completed"
          else
            echo "Schema pushed via db:push"
          fi

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        run: pnpm exec playwright test e2e/tests/smoke/
        env:
          CI: true

      - name: Upload smoke test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────
  # RLS Verification
  # ─────────────────────────────────────────────
  rls-verify:
    name: RLS Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: integration-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aivo
          POSTGRES_PASSWORD: aivo_test_pw
          POSTGRES_DB: aivo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aivo"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://aivo:aivo_test_pw@localhost:5432/aivo_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Lint RLS policies
        run: bash scripts/lint-rls-policies.sh

      - name: Push database schema
        run: pnpm --filter @aivo/db run db:push

      - name: Apply RLS policies
        run: |
          if [ -f packages/db/src/rls/policies.sql ]; then
            psql "$DATABASE_URL" -f packages/db/src/rls/policies.sql
            echo "RLS policies applied"
          else
            echo "::error::packages/db/src/rls/policies.sql not found"
            exit 1
          fi

      - name: Verify RLS is enabled
        run: |
          RLS_TABLES=$(psql "$DATABASE_URL" -t -c \
            "SELECT tablename FROM pg_tables
             WHERE schemaname = 'public'
               AND tablename IN (
                 SELECT relname FROM pg_class
                 JOIN pg_catalog.pg_policies ON pg_class.oid = pg_policies.polrelid
               );" | grep -c '\S' || true)
          echo "Tables with RLS policies: $RLS_TABLES"
          if [ "$RLS_TABLES" -eq 0 ]; then
            echo "::error::No RLS policies found on any table"
            exit 1
          fi
          echo "RLS verification passed — $RLS_TABLES tables have policies"

  # ─────────────────────────────────────────────
  # Python Lint
  # ─────────────────────────────────────────────
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff pyright

      - name: Ruff lint
        run: ruff check services/ai-svc/src/

      - name: Ruff format check
        run: ruff format --check services/ai-svc/src/

  # ─────────────────────────────────────────────
  # Python Tests
  # ─────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: python-lint
    defaults:
      run:
        working-directory: services/ai-svc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run brain clone enrichment tests
        run: |
          if [ -f tests/test_brain_clone_enrichment.py ]; then
            pytest tests/test_brain_clone_enrichment.py -v
          else
            echo "::warning::test_brain_clone_enrichment.py not found, running all tests"
            pytest tests/ -v
          fi

      - name: Run clone progress steps tests
        run: |
          if [ -f tests/test_clone_progress_steps.py ]; then
            pytest tests/test_clone_progress_steps.py -v
          else
            echo "::notice::test_clone_progress_steps.py not found, skipping (covered by previous step)"
          fi

  # ─────────────────────────────────────────────
  # Coverage Gate
  # ─────────────────────────────────────────────
  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: integration-tests

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Verify coverage thresholds
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "Checking coverage thresholds..."

            LINES=$(cat coverage/coverage-summary.json | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total']['lines']['pct'])")
            FUNCTIONS=$(cat coverage/coverage-summary.json | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total']['functions']['pct'])")
            BRANCHES=$(cat coverage/coverage-summary.json | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total']['branches']['pct'])")

            echo "Lines:     $LINES% (threshold: 70%)"
            echo "Functions: $FUNCTIONS% (threshold: 70%)"
            echo "Branches:  $BRANCHES% (threshold: 60%)"

            FAIL=0
            if python3 -c "exit(0 if $LINES >= 70 else 1)"; then
              echo "Lines coverage OK"
            else
              echo "::error::Lines coverage $LINES% is below 70% threshold"
              FAIL=1
            fi
            if python3 -c "exit(0 if $FUNCTIONS >= 70 else 1)"; then
              echo "Functions coverage OK"
            else
              echo "::error::Functions coverage $FUNCTIONS% is below 70% threshold"
              FAIL=1
            fi
            if python3 -c "exit(0 if $BRANCHES >= 60 else 1)"; then
              echo "Branches coverage OK"
            else
              echo "::error::Branches coverage $BRANCHES% is below 60% threshold"
              FAIL=1
            fi

            if [ "$FAIL" -eq 1 ]; then
              exit 1
            fi
            echo "All coverage thresholds met"
          else
            echo "::error::coverage-summary.json not found"
            exit 1
          fi
