name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @aivo/brand
        run: pnpm --filter @aivo/brand build

      - name: Build @aivo/ui
        run: pnpm --filter @aivo/ui build

      - name: Build @aivo/marketing
        run: pnpm --filter @aivo/marketing build

      - name: Lint
        run: pnpm lint:all

      - name: Type check
        run: pnpm type-check:all

      - name: Test
        run: pnpm test:all

  stub-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run stub audit
        run: bash scripts/audit-stubs.sh

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build-lint-typecheck, stub-audit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aivo
          POSTGRES_PASSWORD: aivo_test
          POSTGRES_DB: aivo_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:2.10-alpine
        ports:
          - 4223:4222
        options: >-
          --health-cmd "wget -q --spider http://localhost:8222/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install E2E dependencies
        run: cd e2e && pnpm install

      - name: Install Playwright
        run: cd e2e && pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://aivo:aivo_test@localhost:5433/aivo_test
          REDIS_URL: redis://localhost:6380
          NATS_URL: nats://localhost:4223
          NODE_ENV: test
        run: cd e2e && pnpm exec playwright test --reporter=json --output=coverage-reports/

      - name: Upload E2E coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-reports
          path: e2e/coverage-reports/
          retention-days: 30
