name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 03:00 UTC
  workflow_dispatch:
    inputs:
      scan_depth:
        description: "Number of commits to scan (0 = full history)"
        required: false
        default: "50"
        type: string

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'schedule' && '0' || inputs.scan_depth || '50' }}

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF on failure
        if: steps.gitleaks.outcome == 'failure'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        continue-on-error: true

      - name: Failure summary
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "## Secret Scan Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Gitleaks detected potential secrets in this repository." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Remediation Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **Identify** the leaked secret in the Gitleaks output above" >> $GITHUB_STEP_SUMMARY
          echo "2. **Revoke** the compromised credential immediately" >> $GITHUB_STEP_SUMMARY
          echo "3. **Remove** the secret from code and use environment variables or a secrets manager" >> $GITHUB_STEP_SUMMARY
          echo "4. **Rewrite** git history if the secret was committed (use \`git filter-repo\` or BFG)" >> $GITHUB_STEP_SUMMARY
          echo "5. **Add** the secret pattern to \`.gitleaks.toml\` allowlist if it's a false positive" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the [GitHub Security tab](../../security/code-scanning) for SARIF results." >> $GITHUB_STEP_SUMMARY

      - name: Fail pipeline on secret detection
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::Gitleaks detected secrets. See step summary for remediation."
          exit 1
