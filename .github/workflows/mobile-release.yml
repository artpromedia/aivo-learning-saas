name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string
      platform:
        description: "Platform to release"
        required: true
        default: "both"
        type: choice
        options:
          - android
          - ios
          - both
      track:
        description: "Play Store track (android only)"
        required: false
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

concurrency:
  group: mobile-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Validate
  # ─────────────────────────────────────────────
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ inputs.version }}
      build-number: ${{ steps.build.outputs.number }}

    steps:
      - name: Validate version
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -Pq '^\d+\.\d+\.\d+$'; then
            echo "::error::Invalid version format: $VERSION (expected: X.Y.Z)"
            exit 1
          fi
          echo "Version: $VERSION"

      - name: Compute build number
        id: build
        run: |
          # Use run number as build number for auto-incrementing
          echo "number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # Android Release
  # ─────────────────────────────────────────────
  android:
    name: Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    if: inputs.platform == 'android' || inputs.platform == 'both'
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/mobile/android

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android App Bundle
        run: |
          flutter build appbundle --release \
            --build-name=${{ inputs.version }} \
            --build-number=${{ needs.validate.outputs.build-number }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Verify Fastlane configuration
        run: |
          if [ ! -f "apps/mobile/android/fastlane/Fastfile" ]; then
            echo "::error::Fastlane configuration not found"
            exit 1
          fi

      - name: Upload to Play Store via Fastlane
        working-directory: apps/mobile/android
        run: |
          if [ -f "fastlane/Fastfile" ]; then
            bundle exec fastlane ${{ inputs.track }}
          else
            echo "::warning::Fastlane not configured, skipping Play Store upload"
            echo "AAB built at: build/app/outputs/bundle/release/app-release.aab"
          fi
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aivo-android-aab-${{ inputs.version }}
          path: apps/mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  # ─────────────────────────────────────────────
  # iOS Release
  # ─────────────────────────────────────────────
  ios:
    name: iOS Release
    runs-on: macos-latest
    timeout-minutes: 45
    needs: validate
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true

      - name: Setup Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/mobile/ios

      - name: Install Apple certificate and provisioning profile
        run: |
          # Decode certificates
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 -d > "$CERT_PATH"
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 -d > "$PP_PATH"

          # Create keychain
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install dependencies
        run: flutter pub get

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-name=${{ inputs.version }} \
            --build-number=${{ needs.validate.outputs.build-number }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Verify Fastlane configuration
        run: |
          if [ ! -f "apps/mobile/ios/fastlane/Fastfile" ]; then
            echo "::error::Fastlane configuration not found"
            exit 1
          fi

      - name: Upload to App Store via Fastlane
        working-directory: apps/mobile/ios
        run: |
          if [ -f "fastlane/Fastfile" ]; then
            bundle exec fastlane release
          else
            echo "::warning::Fastlane not configured, skipping App Store upload"
            echo "IPA built at: build/ios/ipa/aivo_mobile.ipa"
          fi
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_API_KEY }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: aivo-ios-ipa-${{ inputs.version }}
          path: apps/mobile/build/ios/ipa/*.ipa
          retention-days: 90
          if-no-files-found: ignore

  # ─────────────────────────────────────────────
  # GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Create Mobile Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, android, ios]
    if: always() && needs.validate.result == 'success' && (needs.android.result == 'success' || needs.ios.result == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android artifact
        if: needs.android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: aivo-android-aab-${{ inputs.version }}
          path: release-artifacts/

      - name: Download iOS artifact
        if: needs.ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: aivo-ios-ipa-${{ inputs.version }}
          path: release-artifacts/
        continue-on-error: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="mobile-v${{ inputs.version }}"
          PLATFORM="${{ inputs.platform }}"

          cat > /tmp/mobile-release-notes.md << EOMD
          ## Mobile Release v${{ inputs.version }}

          **Platform:** $PLATFORM
          **Build Number:** ${{ needs.validate.outputs.build-number }}
          **Date:** $(date -u +"%Y-%m-%d %H:%M UTC")

          ### Distribution
          $([ "$PLATFORM" = "android" ] || [ "$PLATFORM" = "both" ] && echo "- **Android:** Play Store (${{ inputs.track }} track)")
          $([ "$PLATFORM" = "ios" ] || [ "$PLATFORM" = "both" ] && echo "- **iOS:** App Store Connect")
          EOMD

          # Create tag
          git tag -a "$VERSION" -m "Mobile release v${{ inputs.version }}" || true
          git push origin "$VERSION" 2>/dev/null || true

          # Create release with artifacts
          ASSETS=""
          for f in release-artifacts/*; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done

          gh release create "$VERSION" \
            --title "Mobile v${{ inputs.version }}" \
            --notes-file /tmp/mobile-release-notes.md \
            --target "$GITHUB_SHA" \
            $ASSETS || echo "::warning::Release creation may have partially failed"
