name: aivo_mobile
description: AIVO Learning Platform - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.3.0

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.0
  socket_io_client: ^2.0.3+1

  # Auth
  flutter_secure_storage: ^9.2.2
  jwt_decode: ^0.3.1
  local_auth: ^2.3.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  firebase_crashlytics: ^4.2.0
  firebase_analytics: ^11.4.0

  # Sentry
  sentry_flutter: ^8.0.0

  # Offline DB
  drift: ^2.20.3
  drift_flutter: ^0.2.4
  sqflite: ^2.4.1
  hive_flutter: ^1.1.0

  # Media
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  lottie: ^3.1.2

  # Charts
  fl_chart: ^0.69.2

  # Connectivity
  connectivity_plus: ^6.1.1
  flutter_blue_plus: ^1.35.5

  # Background tasks
  workmanager: ^0.6.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  permission_handler: ^11.3.1
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  collection: ^1.18.0
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.3
  riverpod_generator: ^2.6.2
  mockito: ^5.4.4
  mocktail: ^1.0.4
  bloc_test: ^9.1.7
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
          weight: 400
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
