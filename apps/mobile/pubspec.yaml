name: aivo_mobile
description: AIVO Learning Platform - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.1.0

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.0
  socket_io_client: ^3.1.4

  # Auth
  flutter_secure_storage: ^10.0.0
  jwt_decode: ^0.3.1
  local_auth: ^3.0.1

  # Firebase
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_crashlytics: ^5.1.0
  firebase_analytics: ^12.2.0

  # Sentry
  sentry_flutter: ^9.16.0

  # Offline DB
  drift: ^2.20.3
  drift_flutter: ^0.2.4
  sqflite: ^2.4.1
  hive_flutter: ^1.1.0

  # Media
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  lottie: ^3.1.2

  # Charts
  fl_chart: ^1.2.0

  # Connectivity
  connectivity_plus: ^7.1.0
  flutter_blue_plus: ^2.2.1

  # Background tasks
  workmanager: ^0.9.0+3

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  path: ^1.9.0
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  permission_handler: ^12.0.1
  share_plus: ^12.0.2
  url_launcher: ^6.3.1
  collection: ^1.18.0
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  drift_dev: ^2.20.3
  riverpod_generator: ^4.0.3
  mockito: ^5.4.4
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
          weight: 400
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
