groups:
  - name: aivo-sla
    rules:
      - alert: BrainCloneSlow
        expr: histogram_quantile(0.95, sum(rate(brain_clone_duration_seconds_bucket[5m])) by (le)) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Brain clone p95 latency exceeds 10s target"
          description: "Brain clone p95 is {{ $value }}s (target: 10s)"

      - alert: BrainContextFetchSlow
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{route="/brain/:learnerId"}[5m])) by (le)) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Brain context fetch p95 exceeds 50ms target"

      - alert: LLMContentGenSlow
        expr: histogram_quantile(0.95, sum(rate(llm_request_duration_seconds_bucket{session_type="content"}[5m])) by (le)) > 4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM content generation p95 exceeds 4s target"

      - alert: LLMTutorResponseSlow
        expr: histogram_quantile(0.95, sum(rate(llm_request_duration_seconds_bucket{session_type="tutor"}[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM tutor response p95 exceeds 2s target"

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }}"

      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: "{{ $labels.service }} has been down for more than 2 minutes"

      - alert: ServiceDegraded
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.service }} is degraded"
          description: "p95 latency is {{ $value }}s"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 512
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.service }}"

      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool near exhaustion"

      - alert: NATSConsumerLag
        expr: jetstream_consumer_num_pending > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NATS consumer lag is high"
