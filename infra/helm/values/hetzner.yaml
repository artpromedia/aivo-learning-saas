# ─────────────────────────────────────────────
# Ingress — Hetzner with nginx + cert-manager
# ─────────────────────────────────────────────

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: staging.aivo.app
      paths:
        - path: /
          service: web
    - host: api.staging.aivo.app
      paths:
        - path: /auth
          service: identity-svc
        - path: /learning
          service: learning-svc
        - path: /billing
          service: billing-svc
        - path: /family
          service: family-svc
        - path: /engagement
          service: engagement-svc
        - path: /comms
          service: comms-svc
        - path: /admin
          service: admin-svc
        - path: /integrations
          service: integrations-svc
        - path: /tutor
          service: tutor-svc
        - path: /i18n
          service: i18n-svc
        - path: /ai
          service: ai-svc
        - path: /brain
          service: brain-svc
        - path: /assessment
          service: assessment-svc
        - path: /research
          service: research-svc
    - host: status.staging.aivo.app
      paths:
        - path: /
          service: status-page-svc
  tls:
    - secretName: aivo-staging-tls
      hosts:
        - staging.aivo.app
        - api.staging.aivo.app
        - status.staging.aivo.app

# ─────────────────────────────────────────────
# NATS — deploy inside K3s cluster
# ─────────────────────────────────────────────
nats:
  enabled: true
  fullnameOverride: nats
  config:
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 200Gi
  container:
    merge:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 512Mi
