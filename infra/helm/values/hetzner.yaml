# ─────────────────────────────────────────────
# AIVO Learning Platform — Hetzner Cloud Overrides
# Applied via: helm upgrade -f infra/helm/values/hetzner.yaml
# ─────────────────────────────────────────────

global:
  environment: staging
  domain: staging.aivo.app
  tlsEnabled: true

  # Hetzner-managed PostgreSQL
  database:
    host: aivo-pg-staging.c.hetzner.cloud
    port: 5432
    name: aivo_staging
    sslMode: require

  # Hetzner-managed Redis
  redis:
    host: aivo-redis-staging.c.hetzner.cloud
    port: 6379

  # NATS on Hetzner K8s
  nats:
    url: nats://nats.aivo.svc.cluster.local:4222
    jetstream: true

  # Hetzner Object Storage (S3-compatible)
  objectStorage:
    endpoint: https://fsn1.your-objectstorage.com
    bucket: aivo-staging-assets
    region: fsn1

# ─────────────────────────────────────────────
