# ─────────────────────────────────────────────
# Ingress — Production domains via Cloudflare → Hetzner
# Cloudflare handles SSL termination (Full Strict mode),
# cert-manager issues origin certs for the K3s ingress.
# ─────────────────────────────────────────────

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
  hosts:
    # ── Production domains ──
    - host: app.aivolearning.com
      paths:
        - path: /api
          service: identity-svc
        - path: /assessment
          service: assessment-svc
        - path: /
          service: web
    - host: api.aivolearning.com
      paths:
        - path: /auth
          service: identity-svc
        - path: /learning
          service: learning-svc
        - path: /billing
          service: billing-svc
        - path: /family
          service: family-svc
        - path: /engagement
          service: engagement-svc
        - path: /comms
          service: comms-svc
        - path: /admin
          service: admin-svc
        - path: /integrations
          service: integrations-svc
        - path: /tutor
          service: tutor-svc
        - path: /i18n
          service: i18n-svc
        - path: /ai
          service: ai-svc
        - path: /brain
          service: brain-svc
        - path: /assessment
          service: assessment-svc
        - path: /research
          service: research-svc
    - host: status.aivolearning.com
      paths:
        - path: /
          service: status-page-svc
    - host: aivolearning.com
      paths:
        - path: /
          service: marketing
    # ── Staging domains (preserved across production deploys) ──
    - host: staging.aivolearning.com
      paths:
        - path: /api
          service: identity-svc
        - path: /assessment
          service: assessment-svc
        - path: /
          service: web
    - host: staging-api.aivolearning.com
      paths:
        - path: /auth
          service: identity-svc
        - path: /learning
          service: learning-svc
        - path: /billing
          service: billing-svc
        - path: /family
          service: family-svc
        - path: /engagement
          service: engagement-svc
        - path: /comms
          service: comms-svc
        - path: /admin
          service: admin-svc
        - path: /integrations
          service: integrations-svc
        - path: /tutor
          service: tutor-svc
        - path: /i18n
          service: i18n-svc
        - path: /ai
          service: ai-svc
        - path: /brain
          service: brain-svc
        - path: /assessment
          service: assessment-svc
        - path: /research
          service: research-svc
    - host: staging-status.aivolearning.com
      paths:
        - path: /
          service: status-page-svc
  tls:
    - secretName: cloudflare-origin-tls
      hosts:
        - aivolearning.com
        - app.aivolearning.com
        - api.aivolearning.com
        - status.aivolearning.com
        - staging.aivolearning.com
        - staging-api.aivolearning.com
        - staging-status.aivolearning.com

# ─────────────────────────────────────────────
# NATS — deploy inside K3s cluster
# ─────────────────────────────────────────────
nats:
  enabled: true
  fullnameOverride: nats
  config:
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 200Gi
  container:
    merge:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 1000m
          memory: 1Gi
