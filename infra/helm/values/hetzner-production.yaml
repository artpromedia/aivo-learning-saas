# ─────────────────────────────────────────────
# AIVO Learning Platform — Hetzner Dedicated Servers (Production)
# Applied via: helm upgrade -f infra/helm/values/hetzner-production.yaml
#
# Infrastructure (all HEL1, vSwitch 10.0.0.0/24):
#   Server 1 (DB)   10.0.0.1  Xeon W-2145 / 128GB ECC / 2×1.92TB DC SSD
#   Server 2 (App1) 10.0.0.2  i9-9900K / 128GB / 2×1TB NVMe  (K3s control plane)
#   Server 3 (App2) 10.0.0.3  i7-8700 / 128GB / 3×1TB NVMe   (K3s agent + MinIO)
#   Server 4 (ML)   10.0.0.4  Ryzen 9 5950X / 128GB ECC / 2×3.84TB DC SSD
# ─────────────────────────────────────────────

global:
  environment: production
  domain: aivolearning.com
  tlsEnabled: true

  # PostgreSQL via PgBouncer on Server 1 (vSwitch)
  database:
    host: "10.0.0.1"
    port: 6432
    name: aivo_prod
    sslMode: disable        # vSwitch is private L2, no TLS needed

  # Redis 7 on Server 1 (vSwitch)
  redis:
    host: "10.0.0.1"
    port: 6379
  redisSecretName: redis-secrets

  # NATS inside K3s cluster
  nats:
    url: nats://nats.aivo.svc.cluster.local:4222
    jetstream: true

  # Cloudflare R2 for user-facing assets (zero egress)
  objectStorage:
    endpoint: https://YOUR_ACCOUNT_ID.r2.cloudflarestorage.com
    bucket: aivo-content-assets
    region: auto

# ─────────────────────────────────────────────
