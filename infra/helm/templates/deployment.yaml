{{- $global := .Values.global -}}
{{- $services := list
  "identity-svc" "billing-svc" "family-svc" "integrations-svc" "admin-svc"
  "learning-svc" "engagement-svc" "comms-svc" "i18n-svc" "tutor-svc"
  "status-page-svc" "research-svc" "ai-svc" "brain-svc" "assessment-svc"
  "web" "marketing" "research-worker"
-}}
{{- range $svc := $services }}
{{- $svcValues := index $.Values $svc | default dict }}
{{- if (default true (index $svcValues "enabled")) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc }}
  namespace: {{ $global.namespace | default "aivo" }}
  labels:
    app.kubernetes.io/name: {{ $svc }}
    app.kubernetes.io/part-of: aivolearning
    app.kubernetes.io/managed-by: helm
spec:
  replicas: {{ $svcValues.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $svc }}
      app.kubernetes.io/instance: aivolearning
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $svc }}
        app.kubernetes.io/instance: aivolearning
        app.kubernetes.io/part-of: aivolearning
    spec:
      containers:
        - name: {{ $svc }}
          image: "{{ (index $svcValues "image" | default dict).repository | default (printf "%s/%s" $global.registry $svc) }}:{{ (index $svcValues "image" | default dict).tag | default $global.imageTag }}"
          imagePullPolicy: {{ $global.imagePullPolicy | default "IfNotPresent" }}
          {{- if $svcValues.port }}
          ports:
            - containerPort: {{ $svcValues.port }}
              protocol: TCP
          {{- end }}
          {{- if $svcValues.healthCheck }}
          livenessProbe:
            httpGet:
              path: {{ $svcValues.healthCheck.path }}
              port: {{ $svcValues.healthCheck.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: {{ $svcValues.healthCheck.path }}
              port: {{ $svcValues.healthCheck.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          {{- end }}
          {{- if $svcValues.resources }}
          resources:
            {{- toYaml $svcValues.resources | nindent 12 }}
          {{- end }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $global.dbSecretName | default "db-secrets" }}
                  key: database-url
            {{- if $global.redisSecretName }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $global.redisSecretName }}
                  key: redis-url
            {{- else }}
            - name: REDIS_URL
              value: "redis://{{ $global.redis.host }}:{{ $global.redis.port }}"
            {{- end }}
            - name: NATS_URL
              value: {{ $global.nats.url | quote }}
            {{- if not (has $svc (list "web" "marketing")) }}
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $global.jwtSecretName | default "jwt-secrets" }}
                  key: jwt-public-key
            {{- end }}
            {{- if eq $svc "identity-svc" }}
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $global.jwtSecretName | default "jwt-secrets" }}
                  key: jwt-private-key
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: auth-secret
            {{- end }}
            {{- if $svcValues.env }}
            {{- range $key, $value := $svcValues.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
      imagePullSecrets:
        - name: ghcr-pull-secret
      {{- if $svcValues.nodeSelector }}
      nodeSelector:
        {{- toYaml $svcValues.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $svcValues.tolerations }}
      tolerations:
        {{- toYaml $svcValues.tolerations | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
