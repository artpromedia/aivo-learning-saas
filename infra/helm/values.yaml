# ─────────────────────────────────────────────

identity-svc:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/artpromedia/identity-svc
    tag: latest
  port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthCheck:
    path: /health
    port: 3001
  env:
    NODE_ENV: production
    PORT: "3001"

