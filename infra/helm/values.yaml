# ─────────────────────────────────────────────
# AIVO Learning Platform — Default Helm Values
# Override per-environment via values/<env>.yaml
# ─────────────────────────────────────────────

global:
  registry: ghcr.io/artpromedia
  imageTag: latest
  imagePullPolicy: IfNotPresent
  namespace: aivo

  environment: staging
  logLevel: info

  # Domain configuration
  domain: aivo.local
  tlsEnabled: true

  # Database
  database:
    host: postgresql
    port: 5432
    name: aivo
    sslMode: require

  # Redis
  redis:
    host: redis-master
    port: 6379

  # NATS
  nats:
    url: nats://nats:4222
    jetstream: true

# ─────────────────────────────────────────────
