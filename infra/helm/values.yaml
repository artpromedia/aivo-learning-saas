# ─────────────────────────────────────────────
# Infrastructure Dependencies
# ─────────────────────────────────────────────

postgresql:
  enabled: false

redis:
  enabled: false

nats:
  enabled: false

# ─────────────────────────────────────────────
# Ingress
# ─────────────────────────────────────────────

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls:
    - secretName: aivo-tls
      hosts:
        - "*.aivo.local"
