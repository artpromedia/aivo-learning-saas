apiVersion: v2
name: aivolearning
description: AIVO Learning Platform — Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"
maintainers:
  - name: AIVO Platform Team
    email: platform@artpromedia.com
keywords:
  - aivo
  - learning
  - education
  - saas
  - microservices
home: https://github.com/artpromedia/aivo-learning-saas
sources:
  - https://github.com/artpromedia/aivo-learning-saas
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "19.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: nats
    version: "1.x.x"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
