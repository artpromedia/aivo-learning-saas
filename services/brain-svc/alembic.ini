# Alembic configuration for brain-svc
#
# brain-svc uses SQLAlchemy async models that mirror the canonical Drizzle
# schema in @aivo/db.  Alembic is configured here for local migration
# management against the shared PostgreSQL database.

[alembic]
# Path to migration environment
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# SQLAlchemy URL — overridden at runtime by env/alembic/env.py
sqlalchemy.url = postgresql+asyncpg://aivo:aivo_dev@localhost:5432/aivo_dev

# Truncate long revision identifiers to 12 chars
truncate_slug_length = 40

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
