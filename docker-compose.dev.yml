services:
  # ─── Infrastructure ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aivo
      POSTGRES_PASSWORD: aivo_dev
      POSTGRES_DB: aivo_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivo -d aivo_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Identity Service (TypeScript) ─────────────────────────────────────────────
  identity-svc:
    build:
      context: .
      dockerfile: services/identity-svc/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://aivo:aivo_dev@postgres:5432/aivo_dev
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-to-a-random-32-char-secret}
      APP_URL: ${APP_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
      OONRUMAIL_API_KEY: ${OONRUMAIL_API_KEY:-}
      OONRUMAIL_BASE_URL: ${OONRUMAIL_BASE_URL:-https://api.oonrumail.com/v1}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Brain Service (Python) ────────────────────────────────────────────────────
  brain-svc:
    build:
      context: ./services/brain-svc
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql+asyncpg://aivo:aivo_dev@postgres:5432/aivo_dev
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      MODEL_STORE_DIR: /data/models
    volumes:
      - brain_models:/data/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── AI Service (Python) ───────────────────────────────────────────────────────
  ai-svc:
    build:
      context: ./services/ai-svc
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      DATABASE_URL: postgresql+asyncpg://aivo:aivo_dev@postgres:5432/aivo_dev
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_ALGORITHM: RS256
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REASONING_MODEL: ${REASONING_MODEL:-anthropic/claude-sonnet-4-20250514}
      REASONING_FALLBACK_MODEL: ${REASONING_FALLBACK_MODEL:-google/gemini-2.0-flash}
      SMART_MODEL: ${SMART_MODEL:-anthropic/claude-sonnet-4-20250514}
      SMART_FALLBACK_MODEL: ${SMART_FALLBACK_MODEL:-google/gemini-2.0-flash}
      FAST_MODEL: ${FAST_MODEL:-anthropic/claude-sonnet-4-20250514}
      FAST_FALLBACK_MODEL: ${FAST_FALLBACK_MODEL:-google/gemini-2.0-flash}
      SELF_HOSTED_MODEL: ${SELF_HOSTED_MODEL:-ollama/llama3}
      VISION_MODEL: ${VISION_MODEL:-google/gemini-2.0-flash}
      VISION_FALLBACK_MODEL: ${VISION_FALLBACK_MODEL:-openai/gpt-4o}
      IEP_PARSE_MODEL: ${IEP_PARSE_MODEL:-anthropic/claude-sonnet-4-20250514}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      BRAIN_SVC_URL: http://brain-svc:3002
      TOKEN_QUOTA_SOFT_LIMIT_PERCENT: ${TOKEN_QUOTA_SOFT_LIMIT_PERCENT:-80}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Learning Service (TypeScript) ─────────────────────────────────────────────
  learning-svc:
