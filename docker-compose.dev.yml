      DATABASE_URL: postgresql://aivo:aivo_dev@postgres:5432/aivo_dev
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      CLEVER_CLIENT_ID: ${CLEVER_CLIENT_ID:-}
      CLEVER_CLIENT_SECRET: ${CLEVER_CLIENT_SECRET:-}
      CLEVER_REDIRECT_URI: ${CLEVER_REDIRECT_URI:-http://localhost:3010/integrations/clever/callback}
      CLASSLINK_CLIENT_ID: ${CLASSLINK_CLIENT_ID:-}
      CLASSLINK_CLIENT_SECRET: ${CLASSLINK_CLIENT_SECRET:-}
      CLASSLINK_REDIRECT_URI: ${CLASSLINK_REDIRECT_URI:-http://localhost:3010/integrations/classlink/callback}
      LTI_PRIVATE_KEY: ${LTI_PRIVATE_KEY:-}
      LTI_PUBLIC_KEY: ${LTI_PUBLIC_KEY:-}
      LTI_KID: ${LTI_KID:-aivo-lti-key-1}
      IDENTITY_SVC_URL: http://identity-svc:3001
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-aivo-integrations}
